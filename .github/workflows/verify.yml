name: Verify (build + unit tests + lint)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Stub local.properties so signing config lookups don't fail in CI.
      # CI never produces signed release artifacts (release.yml owns that path).
      - name: Stub local.properties
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "pexels.api.key="
            echo "pixabay.api.key="
            echo "freesound.api.key="
            echo "soundcloud.client.id="
            echo "stability.ai.key="
          } > local.properties

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Unit tests (debug)
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-daemon

      - name: Lint (debug)
        run: ./gradlew :app:lintDebug --stacktrace --no-daemon

      - name: Upload unit-test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14
